<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Fuel Finder</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3248;
      --accent:#f5a623;--accent2:#e8831a;--text:#e8eaf0;--muted:#7b8099;
      --green:#4caf7d;--red:#e05c5c;--blue:#5b9cf6;--radius:10px;
    }
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
    /* Header */
    header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:1000}
    header h1{font-size:1.1rem;font-weight:700;color:var(--accent);white-space:nowrap}
    .search-bar{display:flex;gap:6px;flex:1;max-width:560px}
    .search-bar input{flex:1;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:0.875rem;outline:none;transition:border-color .2s}
    .search-bar input:focus{border-color:var(--accent)}
    .search-bar input::placeholder{color:var(--muted)}
    .radius-slider-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0}
    input[type=range].radius-slider{width:90px;accent-color:var(--accent);cursor:pointer;height:4px}
    .radius-label{font-size:0.82rem;font-weight:700;color:var(--accent);min-width:44px;white-space:nowrap}
    .btn{padding:8px 16px;background:var(--accent);color:#0f1117;border:none;border-radius:var(--radius);font-weight:700;font-size:0.875rem;cursor:pointer;transition:background .2s;white-space:nowrap}
    .btn:hover{background:var(--accent2)}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .btn-sm{padding:5px 12px;font-size:0.78rem}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
    .btn-outline:hover{border-color:var(--accent);color:var(--accent);background:transparent}
    .btn-ghost{background:transparent;border:none;color:var(--muted);font-size:0.85rem;cursor:pointer;padding:6px 10px}
    .btn-ghost:hover{color:var(--text)}
    .btn-danger{background:var(--red);color:#fff}
    .btn-danger:hover{background:#c94444}
    .btn-success{background:var(--green);color:#fff}
    .btn-success:hover{background:#3a9165}
    /* Language toggle */
    .lang-toggle{padding:5px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:0.75rem;font-weight:700;cursor:pointer;transition:all .2s;flex-shrink:0;white-space:nowrap}
    .lang-toggle:hover{border-color:var(--accent);color:var(--accent)}
    /* User area in header */
    .header-user{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
    .user-chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:0.8rem;display:flex;align-items:center;gap:6px}
    .role-badge{font-size:0.65rem;font-weight:700;padding:1px 6px;border-radius:10px;background:var(--accent);color:#0f1117;text-transform:uppercase}
    .role-badge.admin{background:var(--blue)}
    /* Layout */
    .main{display:flex;flex:1;overflow:hidden}
    /* Sidebar */
    .sidebar{width:320px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .sidebar-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
    .sort-bar{display:flex;gap:4px;padding:8px 14px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
    .sort-pill{padding:4px 10px;border-radius:20px;font-size:0.72rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;white-space:nowrap}
    .sort-pill.active{background:var(--accent);color:#0f1117;border-color:var(--accent)}
    .sort-pill:hover:not(.active){border-color:var(--accent);color:var(--accent)}
    .sidebar-header h2{font-size:0.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
    .count-badge{background:var(--accent);color:#0f1117;font-size:0.72rem;font-weight:700;padding:2px 7px;border-radius:20px}
    .station-list{overflow-y:auto;flex:1}
    .station-list::-webkit-scrollbar{width:4px}
    .station-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    /* Station card */
    .station-card{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
    .station-card:hover,.station-card.active{background:var(--surface2)}
    .station-card.active{border-left:3px solid var(--accent)}
    .station-name{font-weight:600;font-size:0.9rem;margin-bottom:3px;display:flex;align-items:center;gap:6px}
    .brand-tag{font-size:0.68rem;background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:1px 5px;border-radius:4px}
    .station-meta{font-size:0.78rem;color:var(--muted);margin-bottom:6px}
    .station-footer{display:flex;justify-content:space-between;align-items:center}
    .distance{font-size:0.78rem;font-weight:600;color:var(--accent)}
    /* Prices grid */
    .prices-grid{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0}
    .price-pill{font-size:0.72rem;font-weight:700;padding:3px 8px;border-radius:6px;background:rgba(76,175,125,.12);color:var(--green);border:1px solid rgba(76,175,125,.25)}
    .price-pill.no-price{background:transparent;color:var(--muted);border:1px solid var(--border);font-weight:400}
    .report-btn{font-size:0.72rem;color:var(--blue);background:transparent;border:none;cursor:pointer;padding:0;margin-top:4px}
    .report-btn:hover{text-decoration:underline}
    /* Map */
    #map{flex:1;z-index:0}
    /* Empty/loading */
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;flex:1;color:var(--muted);padding:40px 20px;text-align:center}
    .empty-icon{font-size:2rem}
    .empty-state p{font-size:0.82rem;line-height:1.5}
    .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* Modal backdrop */
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:5000;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal-backdrop.hidden{display:none}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:420px;overflow:hidden}
    .modal-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .modal-header h2{font-size:1rem;font-weight:700}
    .modal-close{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;line-height:1}
    .modal-close:hover{color:var(--text)}
    .modal-body{padding:20px}
    /* Tabs inside modal */
    .tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:18px}
    .tab{flex:1;padding:9px;text-align:center;font-size:0.85rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-left:none;border-right:none;border-top:none}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
    /* Form */
    .form-group{margin-bottom:14px}
    .form-group label{display:block;font-size:0.8rem;color:var(--muted);margin-bottom:5px}
    .form-group input,.form-group select{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:0.875rem;outline:none;transition:border-color .2s}
    .form-group input:focus,.form-group select:focus{border-color:var(--accent)}
    .form-error{font-size:0.78rem;color:var(--red);margin-top:10px;min-height:18px}
    /* Toast */
    #toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:var(--radius);font-size:0.83rem;font-weight:500;z-index:9999;display:none;max-width:300px}
    #toast.error{background:var(--red);color:#fff}
    #toast.success{background:var(--green);color:#fff}
    /* Leaflet popup override */
    .leaflet-popup-content-wrapper{background:var(--surface2)!important;color:var(--text)!important;border:1px solid var(--border)!important;border-radius:var(--radius)!important;box-shadow:0 4px 20px rgba(0,0,0,.5)!important}
    .leaflet-popup-tip{background:var(--surface2)!important}
    .leaflet-popup-content{margin:12px 14px!important}
    .popup-name{font-weight:700;font-size:.95rem;margin-bottom:3px}
    .popup-address{font-size:.78rem;color:var(--muted);margin-bottom:6px}
    .popup-distance{font-size:.82rem;color:var(--accent);font-weight:600}
    /* ── Mobile ──────────────────────────────────────────────────────────────── */
    .mobile-tab-bar{display:none}
    @media(max-width:640px){
      header{flex-wrap:wrap;padding:8px 12px;gap:6px}
      header h1{flex-shrink:0}
      .header-user{order:2;margin-left:auto}
      .lang-toggle{order:3}
      .search-bar{order:4;flex:none;width:100%;max-width:none}
      .radius-slider-wrap{order:5;flex:none}
      input[type=range].radius-slider{width:70px}
      .main{flex-direction:column}
      .sidebar{width:100%;border-right:none;display:none;max-height:calc(100vh - 52px - 100px)}
      .sidebar.mob-show{display:flex}
      #map{width:100%;display:none;min-height:calc(100vh - 52px - 100px)}
      #map.mob-show{display:block;flex:1}
      .mobile-tab-bar{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:2000;background:var(--surface);border-top:1px solid var(--border);height:52px}
      .mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:0.7rem;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;padding:6px 0}
      .mob-tab.active{color:var(--accent)}
      .mob-tab svg{width:20px;height:20px;stroke:currentColor}
      #toast{bottom:62px}
    }
  </style>
</head>
<body>
<header>
  <h1 id="appTitle">⛽ Fuel Finder</h1>
  <div class="search-bar">
    <input id="postcodeInput" type="text" maxlength="8"/>
    <div class="radius-slider-wrap">
      <input type="range" class="radius-slider" id="radiusRange" min="1" max="30" value="10"
        oninput="document.getElementById('radiusLabel').textContent=this.value+' mi'"/>
      <span class="radius-label" id="radiusLabel">10 mi</span>
    </div>
    <button id="searchBtn" class="btn" data-i18n="searchBtn">Search</button>
  </div>
  <button class="lang-toggle" id="langToggleBtn" onclick="toggleLang()">CY</button>
  <div class="header-user" id="headerUser">
    <button class="btn btn-outline btn-sm" id="openAuthBtn" data-i18n="loginRegister">Login / Register</button>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2 data-i18n="stations">Stations</h2>
      <span id="countBadge" class="count-badge" style="display:none">0</span>
    </div>
    <div class="sort-bar" id="sortBar" style="display:none">
      <button class="sort-pill active" data-sort="distance" onclick="setSort('distance')" data-i18n="nearest">📏 Nearest</button>
      <button class="sort-pill" data-sort="E10" onclick="setSort('E10')">E10</button>
      <button class="sort-pill" data-sort="Diesel" onclick="setSort('Diesel')" data-i18n="diesel">Diesel</button>
      <button class="sort-pill" data-sort="Super Unleaded" onclick="setSort('Super Unleaded')" data-i18n="superUnl">Super Unl.</button>
      <button class="sort-pill" data-sort="Electric" onclick="setSort('Electric')" data-i18n="electric">Electric</button>
    </div>
    <div id="stationList" class="station-list">
      <div class="empty-state"><div class="empty-icon">🗺️</div><p data-i18n="enterPostcode">Enter a postcode to find nearby petrol stations</p></div>
    </div>
  </div>
  <div id="map"></div>
</div>

<!-- Auth modal -->
<div class="modal-backdrop hidden" id="authModal">
  <div class="modal">
    <div class="modal-header">
      <h2 data-i18n="account">Account</h2>
      <button class="modal-close" id="authModalClose">&times;</button>
    </div>
    <div class="modal-body">
      <div class="tab-bar">
        <button class="tab active" id="tabLogin" onclick="switchTab('login')" data-i18n="loginTab">Login</button>
        <button class="tab" id="tabRegister" onclick="switchTab('register')" data-i18n="registerTab">Register</button>
      </div>
      <!-- Login -->
      <div id="loginForm">
        <div class="form-group"><label data-i18n="email">Email</label><input type="email" id="loginEmail" placeholder="you@example.com"/></div>
        <div class="form-group"><label data-i18n="password">Password</label><input type="password" id="loginPassword" data-i18n-placeholder="passwordPlaceholder" placeholder="Password"/></div>
        <div class="form-error" id="loginError"></div>
        <button class="btn" style="width:100%;margin-top:4px" id="loginBtn" data-i18n="loginBtn">Login</button>
      </div>
      <!-- Register -->
      <div id="registerForm" style="display:none">
        <div class="form-group"><label data-i18n="username">Username</label><input type="text" id="regUsername" data-i18n-placeholder="usernamePlaceholder" placeholder="yourname"/></div>
        <div class="form-group"><label data-i18n="email">Email</label><input type="email" id="regEmail" placeholder="you@example.com"/></div>
        <div class="form-group"><label data-i18n="password">Password</label><input type="password" id="regPassword" data-i18n-placeholder="minChars" placeholder="Min 8 characters"/></div>
        <div class="form-error" id="registerError"></div>
        <button class="btn" style="width:100%;margin-top:4px" id="registerBtn" data-i18n="createAccount">Create Account</button>
      </div>
    </div>
  </div>
</div>

<!-- Report price modal -->
<div class="modal-backdrop hidden" id="priceModal">
  <div class="modal">
    <div class="modal-header">
      <h2 data-i18n="reportPriceTitle">Report Price</h2>
      <button class="modal-close" id="priceModalClose">&times;</button>
    </div>
    <div class="modal-body">
      <p style="font-size:.83rem;color:var(--muted);margin-bottom:14px"><span data-i18n="stationLabel">Station:</span> <strong id="priceStationName" style="color:var(--text)"></strong></p>
      <div class="form-group">
        <label data-i18n="fuelType">Fuel Type</label>
        <select id="priceFuelType">
          <option value="E10" data-i18n="e10Option">Unleaded (E10)</option>
          <option value="Diesel" data-i18n="dieselOption">Diesel</option>
          <option value="Super Unleaded" data-i18n="superOption">Super Unleaded</option>
          <option value="Electric" data-i18n="electricOption">Electric (per kWh)</option>
        </select>
      </div>
      <div class="form-group">
        <label id="priceLabel" data-i18n="pricePerLitre">Price (pence per litre)</label>
        <input type="number" id="priceValue" min="50" max="999" step="0.1" placeholder="e.g. 142.9"/>
      </div>
      <div class="form-error" id="priceError"></div>
      <button class="btn" style="width:100%;margin-top:4px" id="submitPriceBtn" data-i18n="submitReview">Submit for Review</button>
    </div>
  </div>
</div>

<div class="mobile-tab-bar">
  <button class="mob-tab active" id="mobListTab" onclick="setMobileView('list')">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" xmlns="http://www.w3.org/2000/svg"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    <span data-i18n="list">List</span>
  </button>
  <button class="mob-tab" id="mobMapTab" onclick="setMobileView('map')">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" xmlns="http://www.w3.org/2000/svg"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
    <span data-i18n="map">Map</span>
  </button>
</div>

<div id="toast"></div>

function t(key, vars) {
  var str = (TR[LANG] && TR[LANG][key]) ? TR[LANG][key] : (TR['en'][key] || key);
  if (vars) {
    Object.keys(vars).forEach(function(k) { str = str.replace('{' + k + '}', vars[k]); });
  }
  return str;
}

function applyLang() {
  document.documentElement.lang = LANG;
  document.title = t('pageTitle');
  document.getElementById('appTitle').textContent = t('appTitle');
  document.getElementById('langToggleBtn').textContent = t('langBtn');
  document.getElementById('postcodeInput').placeholder = t('searchPlaceholder');

  // data-i18n text content
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  // data-i18n-placeholder
  document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
    el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
  });

  // Fuel type select options
  var sel = document.getElementById('priceFuelType');
  if (sel) {
    sel.options[0].text = t('e10Option');
    sel.options[1].text = t('dieselOption');
    sel.options[2].text = t('superOption');
    sel.options[3].text = t('electricOption');
  }

  // Re-render dynamic content if stations loaded
  if (allStations.length > 0) { renderSidebar(); }
  renderHeader();
}

function toggleLang() {
  LANG = LANG === 'en' ? 'cy' : 'en';
  localStorage.setItem('ff_lang', LANG);
  applyLang();
}

// ── State ────────────────────────────────────────────────────────────────────
var currentUser  = null;
var currentToken = null;
var markers      = [];
var activeCard   = null;
var activeMarker = null;
var originMarker = null;
var radiusCircle = null;
var selectedStationId   = null;
var selectedStationName = null;
var allStations  = [];
var currentSort  = 'distance';

// ── Persistence ──────────────────────────────────────────────────────────────
function loadSession() {
  var saved = sessionStorage.getItem('ff_token');
  var user  = sessionStorage.getItem('ff_user');
  if (saved && user) { currentToken = saved; currentUser = JSON.parse(user); }
}
function saveSession(token, user) {
  currentToken = token; currentUser = user;
  sessionStorage.setItem('ff_token', token);
  sessionStorage.setItem('ff_user', JSON.stringify(user));
}
function clearSession() {
  currentToken = null; currentUser = null;
  sessionStorage.removeItem('ff_token');
  sessionStorage.removeItem('ff_user');
}

// ── API helper ───────────────────────────────────────────────────────────────
async function api(method, url, body) {
  var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
  if (currentToken) opts.headers['Authorization'] = 'Bearer ' + currentToken;
  if (body) opts.body = JSON.stringify(body);
  var res  = await fetch(url, opts);
  var data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ── Toast ────────────────────────────────────────────────────────────────────
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = type || 'error';
  el.style.display = 'block';
  setTimeout(function() { el.style.display = 'none'; }, 3500);
}

// ── Header user display ──────────────────────────────────────────────────────
function renderHeader() {
  var area = document.getElementById('headerUser');
  if (!currentUser) {
    area.innerHTML = '<button class="btn btn-outline btn-sm" id="openAuthBtn">' + t('loginRegister') + '</button>';
    document.getElementById('openAuthBtn').onclick = function() { document.getElementById('authModal').classList.remove('hidden'); };
    return;
  }
  var isAdmin = currentUser.role === 'admin';
  area.innerHTML =
    '<div class="user-chip">' +
    '<span>' + currentUser.username + '</span>' +
    '<span class="role-badge ' + (isAdmin ? 'admin' : '') + '">' + currentUser.role + '</span>' +
    '</div>' +
    (isAdmin ? '<a href="/admin.html" class="btn btn-outline btn-sm" style="text-decoration:none">' + t('adminPanel') + '</a>' : '') +
    '<button class="btn-ghost" id="logoutBtn">' + t('logout') + '</button>';
  document.getElementById('logoutBtn').onclick = function() {
    clearSession(); renderHeader(); toast(t('loggedOut'), 'success');
  };
}

// ── Auth modal ───────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('loginForm').style.display    = tab === 'login'    ? '' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('tabLogin').classList.toggle('active',    tab === 'login');
  document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
}
document.getElementById('authModalClose').onclick = function() { document.getElementById('authModal').classList.add('hidden'); };

document.getElementById('loginBtn').onclick = async function() {
  var email    = document.getElementById('loginEmail').value.trim();
  var password = document.getElementById('loginPassword').value;
  document.getElementById('loginError').textContent = '';
  try {
    var data = await api('POST', '/api/auth/login', { email: email, password: password });
    saveSession(data.token, data.user);
    document.getElementById('authModal').classList.add('hidden');
    renderHeader();
    toast(t('welcomeBack', { name: data.user.username }), 'success');
  } catch (e) { document.getElementById('loginError').textContent = e.message; }
};

document.getElementById('registerBtn').onclick = async function() {
  var username = document.getElementById('regUsername').value.trim();
  var email    = document.getElementById('regEmail').value.trim();
  var password = document.getElementById('regPassword').value;
  document.getElementById('registerError').textContent = '';
  try {
    var data = await api('POST', '/api/auth/register', { username: username, email: email, password: password });
    saveSession(data.token, data.user);
    document.getElementById('authModal').classList.add('hidden');
    renderHeader();
    toast(t('accountCreated', { name: data.user.username }), 'success');
  } catch (e) { document.getElementById('registerError').textContent = e.message; }
};

// ── Price modal ──────────────────────────────────────────────────────────────
document.getElementById('priceModalClose').onclick = function() { document.getElementById('priceModal').classList.add('hidden'); };
document.getElementById('priceFuelType').onchange = function() {
  var isElec = this.value === 'Electric';
  document.getElementById('priceLabel').textContent     = t(isElec ? 'pricePerKwh' : 'pricePerLitre');
  document.getElementById('priceValue').placeholder     = isElec ? 'e.g. 35.0' : 'e.g. 142.9';
};

function openPriceModal(stationId, stationName) {
  if (!currentUser) {
    toast(t('pleaseLogin'), 'error');
    document.getElementById('authModal').classList.remove('hidden');
    return;
  }
  selectedStationId   = stationId;
  selectedStationName = stationName;
  document.getElementById('priceStationName').textContent = stationName;
  document.getElementById('priceValue').value             = '';
  document.getElementById('priceError').textContent       = '';
  document.getElementById('priceModal').classList.remove('hidden');
}

document.getElementById('submitPriceBtn').onclick = async function() {
  var fuel_type   = document.getElementById('priceFuelType').value;
  var price_pence = parseFloat(document.getElementById('priceValue').value);
  document.getElementById('priceError').textContent = '';
  if (!price_pence || price_pence < 50 || price_pence > 999) {
    document.getElementById('priceError').textContent = t('invalidPrice'); return;
  }
  try {
    await api('POST', '/api/prices/submit', { station_id: selectedStationId, fuel_type: fuel_type, price_pence: price_pence });
    document.getElementById('priceModal').classList.add('hidden');
    toast(t('priceSubmitted'), 'success');
  } catch (e) { document.getElementById('priceError').textContent = e.message; }
};

// ── Map ──────────────────────────────────────────────────────────────────────
var map = L.map('map', { zoomControl: true }).setView([53.0, -4.0], 10);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO', maxZoom: 19,
}).addTo(map);

function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: '<svg width="26" height="36" viewBox="0 0 26 36" xmlns="http://www.w3.org/2000/svg"><path d="M13 0C5.82 0 0 5.82 0 13c0 9.1 13 23 13 23S26 22.1 26 13C26 5.82 20.18 0 13 0z" fill="' + color + '"/><text x="13" y="17" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#0f1117">⛽</text></svg>',
    iconSize: [26, 36], iconAnchor: [13, 36], popupAnchor: [0, -38],
  });
}
var defaultIcon = makeIcon('#f5a623');
var activeIcon  = makeIcon('#ffffff');
var originIcon  = L.divIcon({
  className: '',
  html: '<svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><circle cx="9" cy="9" r="8" fill="#4caf7d" stroke="#0f1117" stroke-width="2"/><circle cx="9" cy="9" r="3" fill="#0f1117"/></svg>',
  iconSize: [18, 18], iconAnchor: [9, 9],
});

function clearMap() {
  markers.forEach(function(m) { map.removeLayer(m); });
  markers = [];
  if (originMarker) { map.removeLayer(originMarker); originMarker = null; }
  if (radiusCircle) { map.removeLayer(radiusCircle); radiusCircle = null; }
}

// ── Price pills helper ───────────────────────────────────────────────────────
var FUEL_LABELS = { 'E10': 'E10', 'Diesel': 'DSL', 'Super Unleaded': 'SUL', 'Electric': 'EV' };
function renderPrices(prices) {
  var fuels = ['E10', 'Diesel', 'Super Unleaded', 'Electric'];
  return fuels.map(function(f) {
    var p = prices && prices[f];
    return p
      ? '<span class="price-pill">' + FUEL_LABELS[f] + ' ' + p + 'p</span>'
      : '<span class="price-pill no-price">' + FUEL_LABELS[f] + ' –</span>';
  }).join('');
}

// ── Build sidebar card ───────────────────────────────────────────────────────
function renderCard(station, marker) {
  var card = document.createElement('div');
  card.className = 'station-card';
  card.innerHTML =
    '<div class="station-name">' + station.name +
    (station.brand && station.brand !== station.name ? '<span class="brand-tag">' + station.brand + '</span>' : '') +
    '</div>' +
    (station.address ? '<div class="station-meta">📍 ' + station.address + '</div>' : '') +
    '<div class="prices-grid">' + renderPrices(station.prices) + '</div>' +
    '<div class="station-footer">' +
    '<span class="distance">📏 ' + station.distanceMiles + ' mi</span>' +
    '<button class="report-btn" onclick="event.stopPropagation();openPriceModal(' + station.id + ',\'' + (station.name || '').replace(/'/g, "\\'") + '\')">' + t('reportPrice') + '</button>' +
    '</div>';

  card.addEventListener('click', function() {
    if (activeCard) activeCard.classList.remove('active');
    if (activeMarker) activeMarker.setIcon(defaultIcon);
    card.classList.add('active');
    marker.setIcon(activeIcon);
    activeCard = card; activeMarker = marker;
    if (isMobile()) { setMobileView('map'); }
    map.flyTo([station.lat, station.lon], 15, { duration: 0.8 });
    marker.openPopup();
  });
  return card;
}

// ── Sort & render sidebar ─────────────────────────────────────────────────────
function setSort(key) {
  currentSort = key;
  document.querySelectorAll('.sort-pill').forEach(function(btn) {
    btn.classList.toggle('active', btn.getAttribute('data-sort') === key);
  });
  renderSidebar();
}

function renderSidebar() {
  if (!allStations.length) return;
  var sorted = allStations.slice().sort(function(a, b) {
    if (currentSort === 'distance') return a.station.distanceMiles - b.station.distanceMiles;
    var pa = a.station.prices && a.station.prices[currentSort] != null ? a.station.prices[currentSort] : Infinity;
    var pb = b.station.prices && b.station.prices[currentSort] != null ? b.station.prices[currentSort] : Infinity;
    if (pa !== pb) return pa - pb;
    return a.station.distanceMiles - b.station.distanceMiles;
  });
  activeCard = null;
  if (activeMarker) { activeMarker.setIcon(defaultIcon); activeMarker = null; }
  var list = document.createElement('div');
  sorted.forEach(function(item) {
    var card = renderCard(item.station, item.marker);
    item.marker.off('click');
    item.marker.on('click', function() {
      if (activeCard) activeCard.classList.remove('active');
      if (activeMarker) activeMarker.setIcon(defaultIcon);
      card.classList.add('active'); item.marker.setIcon(activeIcon);
      activeCard = card; activeMarker = item.marker;
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
    list.appendChild(card);
  });
  document.getElementById('stationList').innerHTML = '';
  document.getElementById('stationList').appendChild(list);
}

// ── Search ───────────────────────────────────────────────────────────────────
async function search() {
  var postcode = document.getElementById('postcodeInput').value.trim();
  var radiusMi = parseInt(document.getElementById('radiusRange').value);
  var radius   = (radiusMi * 1.60934).toFixed(1);
  var btn      = document.getElementById('searchBtn');
  if (!postcode) { toast(t('pleasePostcode'), 'error'); return; }
  btn.disabled = true; btn.textContent = t('searching');
  document.getElementById('stationList').innerHTML = '<div class="empty-state"><div class="spinner"></div><p>' + t('findingStations') + '</p></div>';
  document.getElementById('countBadge').style.display = 'none';
  clearMap(); activeCard = null; activeMarker = null; allStations = []; currentSort = 'distance';
  document.querySelectorAll('.sort-pill').forEach(function(b) { b.classList.toggle('active', b.getAttribute('data-sort') === 'distance'); });
  document.getElementById('sortBar').style.display = 'none';
  try {
    var data = await api('GET', '/api/stations?postcode=' + encodeURIComponent(postcode) + '&radius=' + radius);
    originMarker = L.marker([data.origin.lat, data.origin.lon], { icon: originIcon }).addTo(map).bindTooltip('📮 ' + data.origin.display);
    radiusCircle = L.circle([data.origin.lat, data.origin.lon], { radius: data.radiusKm * 1000, color: '#f5a623', weight: 1, opacity: .4, fillOpacity: .04 }).addTo(map);
    if (data.stations.length === 0) {
      document.getElementById('stationList').innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><p>' + t('noStations', { r: data.radiusKm }) + '</p></div>';
      map.flyTo([data.origin.lat, data.origin.lon], 12); return;
    }
    var bounds = [[data.origin.lat, data.origin.lon]];
    data.stations.forEach(function(station) {
      var popup = '<div class="popup-name">' + station.name + '</div>' +
        (station.address ? '<div class="popup-address">📍 ' + station.address + '</div>' : '') +
        '<div class="popup-distance">📏 ' + station.distanceMiles + ' mi</div>';
      var marker = L.marker([station.lat, station.lon], { icon: defaultIcon }).addTo(map).bindPopup(popup);
      markers.push(marker);
      bounds.push([station.lat, station.lon]);
      allStations.push({ station: station, marker: marker });
    });
    document.getElementById('countBadge').textContent = data.stations.length;
    document.getElementById('countBadge').style.display = 'inline-block';
    document.getElementById('sortBar').style.display = 'flex';
    renderSidebar();
    map.fitBounds(bounds, { padding: [40, 40] });
  } catch (e) {
    toast(e.message, 'error');
    document.getElementById('stationList').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><p>' + e.message + '</p></div>';
  } finally {
    btn.disabled = false; btn.textContent = t('searchBtn');
  }
}

document.getElementById('searchBtn').addEventListener('click', search);
document.getElementById('postcodeInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') search(); });

// ── Mobile view toggle ────────────────────────────────────────────────────────
function isMobile() { return window.innerWidth <= 640; }

function setMobileView(view) {
  var sidebar = document.querySelector('.sidebar');
  var mapEl   = document.getElementById('map');
  if (view === 'list') {
    sidebar.classList.add('mob-show');
    mapEl.classList.remove('mob-show');
    document.getElementById('mobListTab').classList.add('active');
    document.getElementById('mobMapTab').classList.remove('active');
  } else {
    mapEl.classList.add('mob-show');
    sidebar.classList.remove('mob-show');
    document.getElementById('mobMapTab').classList.add('active');
    document.getElementById('mobListTab').classList.remove('active');
    setTimeout(function() { map.invalidateSize(); }, 50);
  }
}

if (isMobile()) { document.querySelector('.sidebar').classList.add('mob-show'); }

// ── Init ─────────────────────────────────────────────────────────────────────
loadSession();
applyLang();
</script>
</body>
